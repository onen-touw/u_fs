INPUT = ../src
OUTPUT_DIRECTORY = ./

PROJECT_NAME           = "UFO File System Library"
PROJECT_NUMBER         = 1.0.0
PROJECT_BRIEF          = "ESP32 File System Wrapper Library"

RECURSIVE              = YES
FILE_PATTERNS          = *.h *.cpp

# Для красивых диаграмм
HAVE_DOT               = YES
UML_LOOK               = YES

# Для группировки
EXTRACT_ALL            = YES
EXTRACT_PRIVATE        = NO
EXTRACT_STATIC         = NO


# Для HTML
HTML_OUTPUT            = html
HTML_COLORSTYLE        = AUTO_LIGHT

# ГЛАВНОЕ: указываем файл с главной страницей
USE_MDFILE_AS_MAINPAGE = mainpage.dox